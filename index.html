<body>

<div class="container">

<h2>Ok Trading Simulator</h2>

<button class="tabBtn activeTab" onclick="showTab('sim')">Simulator</button>
<button class="tabBtn" onclick="showTab('history')">History</button>

<!-- SIMULATOR -->
<div id="simTab">

<div class="card">
  <label>Capital</label>
  <input id="capital" type="number" value="10">

  <label>Multiplier</label>
  <input id="multiplier" type="number" value="2.5">

  <label>Phases</label>
  <input id="phases" type="number" value="8">

  <label>Max Capital Limit (optional)</label>
  <input id="maxCap" type="number">

  <button class="win" onclick="initSystem()">Initialize System</button>
</div>

<div id="resultMsg"></div>

<div class="stakeBox">
  <div class="stakeLabel">Current Stake</div>
  <div id="stake" class="stakeValue">0.000</div>
</div>

<div class="card">

<label>Phase Limit</label>
<input id="limit" type="number" value="8">

  <div class="row">
    <span>Current Phase</span>
    <b id="phase">1</b>
  </div>

  <div class="row">
    <span>Wins</span>
    <b id="wins">0</b>
  </div>

  <div class="row">
    <span>Losses</span>
    <b id="losses">0</b>
  </div>

  <div class="row">
    <span>Profit</span>
    <b id="profit">0.00</b>
  </div>

  <div class="row">
    <span style="font-size:12px; opacity:0.6;">Balance</span>
    <b id="totalBalance" style="font-size:14px;">10.000</b>
  </div>

 

<div class="actionBox">
  <button class="win bigBtn" onclick="win()">WIN</button>
  <button class="lose bigBtn" onclick="loss()">LOSS</button>
</div>

<button class="reset" onclick="resetSim()">↻</button>

</div>

</div>

<!-- HISTORY TAB -->

<div class="card">
<h3>🧠 Insights</h3>
<div id="insights"></div>
</div>

<div class="card">
<h3>📅 Daily Summary</h3>
<div id="daily"></div>
</div>

<div class="card">
<h3>📊 Trade History</h3>

<button class="lose" onclick="clearHistory()">🗑 Clear History</button>

<table>
<thead>
<tr>
<th>#</th><th>Time</th><th>Result</th><th>Phase</th><th>Stake</th><th>Profit</th><th>Balance</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<script>

let phase = 1;
let winCount = 0;
let lossCount = 0;
let profit = 0;

let phaseTable = [];
let balanceHistory = [];

/* TAB */
function showTab(tab){
  document.getElementById("simTab").style.display = tab==="sim"?"block":"none";
  document.getElementById("historyTab").style.display = tab==="history"?"block":"none";
}

/* STORAGE */
function saveTrade(obj){
  let data = JSON.parse(localStorage.getItem("trades")||"[]");
  data.push(obj);
  localStorage.setItem("trades", JSON.stringify(data));
}

function getTrades(){
  return JSON.parse(localStorage.getItem("trades")||"[]");
}

/* INIT */
function initSystem() {
  buildPhaseTable();
  updateUI();
  showMsg("🔄 System Initialized");
}

/* BUILD */
function buildPhaseTable() {
  let C = parseFloat(document.getElementById("capital").value);
  let r = parseFloat(document.getElementById("multiplier").value);
  let n = parseInt(document.getElementById("phases").value);

  let denom = Math.pow(r, n) - 1;
  let start = (C * (r - 1)) / denom;

  phaseTable = [];

  for (let i = 0; i < n; i++) {
    phaseTable.push(start * Math.pow(r, i));
  }
}

function getStake() {
  return phaseTable[phase - 1] || 0;
}

/* WIN */
function win() {
  winCount++;

  let stake = getStake();
  let multiplier = parseFloat(document.getElementById("multiplier").value);
  let winProfit = stake * (multiplier - 1);

  profit += winProfit;

  let capitalInput = document.getElementById("capital");
  let currentCapital = parseFloat(capitalInput.value);

  let newCapital = currentCapital + winProfit;

  let maxCap = parseFloat(document.getElementById("maxCap").value);
  if (!isNaN(maxCap) && newCapital >= maxCap) {
    newCapital = maxCap;
  }

  capitalInput.value = newCapital.toFixed(3);

  saveTrade(makeTrade("WIN", stake, winProfit, newCapital));

  profit = 0;
  phase = 1;
  buildPhaseTable();

  updateUI();
}

/* LOSS */
function loss() {
  lossCount++;

  let stake = getStake();
  profit -= stake;

  saveTrade(makeTrade("LOSS", stake, -stake, getBalance()));

  phase++;

  let limit = parseInt(document.getElementById("limit").value);
  if (phase > limit) phase = 1;

  updateUI();
}

function makeTrade(result, stake, profitVal, balance){
  let now = new Date();
  return {
    result,
    phase,
    stake: stake.toFixed(3),
    profit: profitVal.toFixed(3),
    balance: balance.toFixed(3),
    date: now.toISOString().split("T")[0],
    time: now.toLocaleTimeString()
  };
}

function getBalance(){
  return parseFloat(document.getElementById("capital").value) + profit;
}

/* UI */
function updateUI() {
  document.getElementById("phase").innerText = phase;
  document.getElementById("wins").innerText = winCount;
  document.getElementById("losses").innerText = lossCount;
  document.getElementById("profit").innerText = profit.toFixed(2);
  document.getElementById("totalBalance").innerText = getBalance().toFixed(3);
  document.getElementById("stake").innerText = getStake().toFixed(3);

  renderHistory();
}

function showMsg(text) {
  document.getElementById("resultMsg").innerText = text;
  setTimeout(() => {
    document.getElementById("resultMsg").innerText = "";
  }, 10000);
}

/* HISTORY */
function renderHistory(){
  let trades = getTrades();

  let table="";
  trades.forEach((t,i)=>{
    table+=`<tr>
    <td>${i+1}</td>
    <td>${t.time}</td>
    <td>${t.result}</td>
    <td>${t.phase}</td>
    <td>${t.stake}</td>
    <td>${t.profit}</td>
    <td>${t.balance}</td>
    </tr>`;
  });
  document.getElementById("historyTable").innerHTML = table;

  let winsN = trades.filter(t=>t.result==="WIN").length;
  let total = trades.length;
  let winRate = total ? ((winsN/total)*100).toFixed(1) : 0;

  document.getElementById("insights").innerHTML =
  `Trades: ${total}<br>Win Rate: ${winRate}%<br>Wins: ${winsN}<br>Losses: ${total-winsN}`;
}

/* CLEAR */
function clearHistory(){
  if(confirm("Delete all history?")){
    localStorage.removeItem("trades");
    renderHistory();
  }
}

function resetSim() {
  phase = 1;
  winCount = 0;
  lossCount = 0;
  profit = 0;
  balanceHistory = [];

  buildPhaseTable();

  showMsg("🔄 Reset Completed");

  updateUI();
}

updateUI();

</script>

</body>
